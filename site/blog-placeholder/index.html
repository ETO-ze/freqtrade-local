<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuskRain Blog / 建设中</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101f;
      --panel: rgba(10, 18, 41, 0.84);
      --line: rgba(109, 190, 255, 0.2);
      --text: #edf5ff;
      --muted: #93a7d6;
      --cyan: #61e3ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(79, 123, 255, 0.22), transparent 30%),
        linear-gradient(180deg, #0a1430 0%, var(--bg) 72%);
      color: var(--text);
      font-family: "Noto Sans SC", sans-serif;
    }

    .panel {
      width: min(760px, 100%);
      padding: 34px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
    }

    .eyebrow,
    h1 {
      font-family: "Orbitron", sans-serif;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--cyan);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.2rem);
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.9;
    }

    a {
      color: var(--cyan);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="panel">
    <p class="eyebrow">DUSKRAIN BLOG NODE</p>
    <h1>博客模块建设中</h1>
    <p>这里将用于沉淀策略研究、回测记录、因子观察、自动训练日志和阶段性复盘。</p>
    <p>当前先保留占位页，等内容结构稳定后再接入正式博客系统。</p>
    <p><a href="https://duskrain.cn/">返回首页</a></p>
  </main>
</body>
</html>
